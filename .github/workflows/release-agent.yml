name: Release Server Agent

on:
  push:
    tags:
      - "agent/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server-agent/go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: server-agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
