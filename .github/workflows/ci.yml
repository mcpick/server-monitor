name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server-agent/go.mod

      - run: go vet ./...
      - run: go test ./...

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: dashboard/package.json

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check
      - run: pnpm lint
      - run: pnpm build
