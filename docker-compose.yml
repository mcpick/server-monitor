services:
  # Local Turso-compatible SQLite database
  sqld:
    image: ghcr.io/libsql/sqld:latest
    container_name: server-monitor-db
    ports:
      - "8080:8080"
    volumes:
      - sqld-data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - server-monitor

  # Go daemon for metrics collection
  server-agent:
    build:
      context: ./server-agent
      dockerfile: Dockerfile
    container_name: server-monitor-agent
    depends_on:
      sqld:
        condition: service_healthy
    environment:
      - TURSO_DATABASE_URL=http://sqld:8080
      - TURSO_AUTH_TOKEN=
      - COLLECTION_INTERVAL=5s
      - HOSTNAME=docker-agent
    restart: unless-stopped
    networks:
      - server-monitor

  # React dashboard with nginx
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: server-monitor-dashboard
    depends_on:
      sqld:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      - VITE_TURSO_DATABASE_URL=http://localhost:8080
      - VITE_TURSO_AUTH_TOKEN=
      - VITE_AUTH_USERNAME=admin
      - VITE_AUTH_PASSWORD_HASH=${VITE_AUTH_PASSWORD_HASH:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
    networks:
      - server-monitor

volumes:
  sqld-data:

networks:
  server-monitor:
    driver: bridge
