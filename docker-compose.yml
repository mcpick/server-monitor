services:
  # Local Turso-compatible SQLite database
  sqld:
    image: ghcr.io/libsql/sqld:latest
    container_name: server-monitor-db
    ports:
      - "8080:8080"
    volumes:
      - sqld-data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - server-monitor

  # Go daemon for metrics collection
  server-agent:
    build:
      context: ./server-agent
      dockerfile: Dockerfile
    container_name: server-monitor-agent
    depends_on:
      sqld:
        condition: service_healthy
    environment:
      - TURSO_DATABASE_URL=http://sqld:8080
      - TURSO_AUTH_TOKEN=
      - COLLECTION_INTERVAL=5s
      - HOSTNAME=docker-agent
      - HEALTH_PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - server-monitor

  # TanStack Start dashboard with Node.js
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: server-monitor-dashboard
    depends_on:
      sqld:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Server-side only environment variables (not exposed to client)
      - TURSO_DATABASE_URL=http://sqld:8080
      - TURSO_AUTH_TOKEN=
      - AUTH_USERNAME=admin
      # bcrypt hash for "admin" - generate with: npx bcrypt-cli hash your-password
      - AUTH_PASSWORD_HASH=${AUTH_PASSWORD_HASH:-\$2b\$12\$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/X4.GZPzL5q7HYPcIa}
      # JWT secret - generate with: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-256-bit-secret-key-in-production}
    networks:
      - server-monitor

volumes:
  sqld-data:

networks:
  server-monitor:
    driver: bridge
